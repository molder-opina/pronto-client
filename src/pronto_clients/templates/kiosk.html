{% extends "base.html" %}

{% block content %}
<style>
  .kiosk-container {
    max-width: 800px;
    margin: 1rem auto;
    text-align: center;
    padding: clamp(0.9rem, 3vw, 2rem);
    box-sizing: border-box;
  }

  .kiosk-header {
    margin-bottom: clamp(1.2rem, 4vw, 3rem);
  }

  .kiosk-title {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .kiosk-subtitle {
    color: var(--muted);
    font-size: clamp(0.95rem, 2.8vw, 1.2rem);
  }

  .kiosk-message {
    background: var(--card-bg);
    padding: clamp(0.9rem, 3vw, 2rem);
    border-radius: 16px;
    margin-bottom: 1.2rem;
  }

  .kiosk-message p {
    font-size: clamp(0.95rem, 2.8vw, 1.1rem);
    margin-bottom: 0;
  }

  #kiosk-start-btn {
    background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
    color: white;
    border: none;
    padding: clamp(0.9rem, 3vw, 1.5rem) clamp(1.1rem, 4vw, 3rem);
    font-size: clamp(1rem, 3.8vw, 1.5rem);
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    width: min(100%, 420px);
    min-height: 44px;
  }

  @media (max-width: 520px) {
    .kiosk-container {
      margin: 0.5rem auto;
      padding: 0.75rem;
    }
  }
</style>

<div class="kiosk-container">
  <div class="kiosk-header">
    <h1 class="kiosk-title">Bienvenido a {{ restaurant_name }}</h1>
    <p class="kiosk-subtitle">Kiosk - {{ location }}</p>
  </div>
  
  <div class="kiosk-message">
    <p>
      Toca el botón para comenzar tu pedido
    </p>
  </div>
  
  <button id="kiosk-start-btn">
    Comenzar Pedido
  </button>
  
  <div id="kiosk-status" style="margin-top: 1rem; display: none;"></div>
</div>

<script>
document.getElementById('kiosk-start-btn').addEventListener('click', async () => {
  const btn = document.getElementById('kiosk-start-btn');
  const status = document.getElementById('kiosk-status');
  
  btn.disabled = true;
  btn.textContent = 'Iniciando...';
  status.style.display = 'block';
  status.innerHTML = '<p style="color: var(--muted);">Cargando menú...</p>';
  
  try {
    const response = await fetch('/kiosk/{{ location }}/start', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content
      }
    });
    
    const data = await response.json();
    
    if (data.success) {
      status.innerHTML = '<p style="color: green;">¡Listo! Redirigiendo al menú...</p>';
      setTimeout(() => {
        window.location.href = '/';
      }, 500);
    } else {
      status.innerHTML = '<p style="color: red;">Error: ' + (data.error || 'Intente de nuevo') + '</p>';
      btn.disabled = false;
      btn.textContent = 'Comenzar Pedido';
    }
  } catch (error) {
    status.innerHTML = '<p style="color: red;">Error de conexión. Intente de nuevo.</p>';
    btn.disabled = false;
    btn.textContent = 'Comenzar Pedido';
  }
});
</script>
{% endblock %}
